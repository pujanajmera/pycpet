name: build-wheels

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # -------------------------
      # Linux OpenMP support
      # -------------------------
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libomp-dev

      # -------------------------
      # macOS OpenMP support
      # -------------------------
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install libomp

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel cibuildwheel

      - name: Build wheels (cibuildwheel)
        env:
          CIBW_SKIP: "pp*"
          
          # Ensure OpenMP is available in both environments
          CIBW_ENVIRONMENT_LINUX: >
            CFLAGS="-fopenmp"
            LDFLAGS="-fopenmp"

          CIBW_ENVIRONMENT_MACOS: >
            CC=clang
            CXX=clang++
            CFLAGS="-Xpreprocessor -fopenmp -I/opt/homebrew/opt/libomp/include"
            LDFLAGS="-L/opt/homebrew/opt/libomp/lib -lomp"

        run: |
          python -m cibuildwheel --output-dir wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: wheelhouse/*
