name: Publish to PyPI

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # ONLY strict X.Y.Z (no a/b/rc)

permissions:
  contents: read
  id-token: write   # required for PyPI trusted publishing

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # macOS dependency (only if needed for your build)
      - name: Install libomp (macOS only)
        if: runner.os == 'macOS'
        run: brew install libomp

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.18.1
        with:
          output-dir: dist
        env:
          CIBW_SKIP: "pp* *musllinux* *-win32 *win_amd64"

          # macOS OpenMP support (keep if your extension needs it)
          CIBW_ENVIRONMENT_MACOS: >
            CFLAGS="-O3 -march=native -funroll-loops -ffast-math -fPIC -I/opt/homebrew/opt/libomp/include -Xpreprocessor -fopenmp"
            LDFLAGS="-L/opt/homebrew/opt/libomp/lib -lomp"

      - name: Build sdist (Linux only)
        if: runner.os == 'Linux'
        run: |
          python -m pip install build
          python -m build --sdist --outdir dist

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ runner.os }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest

    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
