name: build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-wheels:
    runs-on: macos-13

    strategy:
      matrix:
        python-version: ["3.9"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system deps (OpenMP fix)
        run: |
          brew install libomp

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel cibuildwheel

      - name: Build wheels
        env:
          CIBW_ARCHS_MACOS: "arm64"
          CIBW_ENVIRONMENT_MACOS: >
            CC=clang
            CXX=clang++
            CFLAGS="-Xpreprocessor -fopenmp -I/opt/homebrew/opt/libomp/include"
            LDFLAGS="-L/opt/homebrew/opt/libomp/lib -lomp"
        run: |
          python -m cibuildwheel --output-dir wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: wheelhouse/*
