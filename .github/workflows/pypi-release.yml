name: PyPI + GitHub Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build_wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OpenMP (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libomp

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.20.0
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-*"

          # Linux
          CIBW_ENVIRONMENT_LINUX: >
            CFLAGS="-O3 -march=native -funroll-loops -ffast-math -fPIC"

          # macOS
          CIBW_ENVIRONMENT_MACOS: >
            CC=clang
            CXX=clang++
            CPPFLAGS="-Xpreprocessor -fopenmp -I$(brew --prefix libomp)/include"
            CFLAGS="-O3 -march=native -funroll-loops -ffast-math -fPIC -Xpreprocessor -fopenmp"
            LDFLAGS="-L$(brew --prefix libomp)/lib -lomp"

          # Skip unsupported builds
          CIBW_SKIP: "pp* *-win32 *-manylinux_i686"

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build
        run: python -m pip install build

      - name: Build sdist
        run: python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    if: |
        startsWith(github.ref_name, 'v') &&
        !contains(github.ref_name, 'a') &&
        !contains(github.ref_name, 'b') &&
        !contains(github.ref_name, 'rc')
    name: Publish to PyPI
    needs: build_wheels

    # ONLY publish stable versions like v0.0.8
    # DO NOT publish prereleases like v0.0.8a
    

    runs-on: ubuntu-latest

    environment:
      name: pypi

    permissions:
      id-token: write

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p final_dist
          find dist -name "*.whl" -exec cp {} final_dist/ \;
          find dist -name "*.tar.gz" -exec cp {} final_dist/ \;

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: final_dist

  github_release:
    name: GitHub Release
    needs: [build_wheels, build_sdist]

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p final_dist
          find dist -name "*.whl" -exec cp {} final_dist/ \;
          find dist -name "*.tar.gz" -exec cp {} final_dist/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: final_dist/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'a') }}