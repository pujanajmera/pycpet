name: Release (PyPI + GitHub)

on:
  push:
    tags:
      - "v*.*.*"   # ONLY strict X.Y.Z

permissions:
  contents: write   # needed for GitHub release
  id-token: write   # needed for PyPI trusted publishing

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ---------- macOS OpenMP ----------
      - name: Install libomp (macOS only)
        if: runner.os == 'macOS'
        run: brew install libomp

      # ---------- build wheels ----------
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.18.1
        with:
          output-dir: dist
        env:
          CIBW_SKIP: "pp* *musllinux* *-win32 *win_amd64"

          CIBW_ENVIRONMENT_MACOS: >
            CFLAGS="-O3 -march=native -funroll-loops -ffast-math -fPIC -I/opt/homebrew/opt/libomp/include -Xpreprocessor -fopenmp"
            LDFLAGS="-L/opt/homebrew/opt/libomp/lib -lomp"

      # ---------- build sdist (only once) ----------
      - name: Build sdist (Linux only)
        if: runner.os == 'Linux'
        run: |
          python -m pip install build
          python -m build --sdist --outdir dist

      # ---------- enforce strict version (fail early if needed) ----------
      - name: Validate tag version format
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          if [[ ! $TAG =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: $TAG"
            exit 1
          fi

      # ---------- upload artifacts ----------
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ runner.os }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # ---------- PyPI publish ----------
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

      # ---------- GitHub Release ----------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
